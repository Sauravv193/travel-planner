<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#6B2E2E"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#D8C4AE" stroke-width="2.5" opacity="0.6"/>
  <!-- Compass body -->
  <circle cx="50" cy="50" r="30" fill="#8A5A44" opacity="0.3"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#D8C4AE" stroke-width="1.5" opacity="0.8"/>
  <!-- Compass needle - North -->
  <polygon points="50,22 44,50 50,44 56,50" fill="#D8C4AE"/>
  <!-- Compass needle - South -->
  <polygon points="50,78 44,50 50,56 56,50" fill="#F5E9D8"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#6B2E2E"/>
  <!-- Cardinal points -->
  <text x="50" y="18" text-anchor="middle" fill="#D8C4AE" font-size="9" font-weight="bold" font-family="Georgia">N</text>
  <text x="50" y="88" text-anchor="middle" fill="#F5E9D8" font-size="9" font-weight="bold" font-family="Georgia">S</text>
  <text x="78" y="54" text-anchor="middle" fill="#D8C4AE" font-size="9" font-weight="bold" font-family="Georgia">E</text>
  <text x="22" y="54" text-anchor="middle" fill="#D8C4AE" font-size="9" font-weight="bold" font-family="Georgia">W</text>
</svg>
