services:
  - type: web
    name: travel-planner-backend
    env: java
    buildCommand: cd backend/WarderGen && mvn clean install -DskipTests
    startCommand: cd backend/WarderGen && java -Dspring.profiles.active=production -Dserver.port=$PORT -Dserver.address=0.0.0.0 -jar target/*.jar
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
