name: Deploy Backend — Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Render
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/WarderGen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Build Docker image
        run: |
          docker build -t travel-planner-backend:latest \
            -f ../../Dockerfile ../../

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker tag travel-planner-backend:latest ${{ secrets.DOCKER_USERNAME }}/travel-planner-backend:latest
          docker tag travel-planner-backend:latest ${{ secrets.DOCKER_USERNAME }}/travel-planner-backend:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/travel-planner-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/travel-planner-backend:$IMAGE_TAG

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
