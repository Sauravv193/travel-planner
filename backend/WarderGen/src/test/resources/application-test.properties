# Test Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT Configuration
travel.app.jwtSecret=dGVzdFNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvblRoYXRJc0xvbmdFbm91Z2hGb3JIUzI1NkFsZ29yaXRobQ==
travel.app.jwtExpirationMs=900000
travel.app.jwtRefreshExpirationMs=604800000

# Redis Configuration (disabled for tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Disable email for tests
spring.mail.enabled=false

# Security Configuration
app.security.email-verification-required=false

# Rate Limiting Configuration
rate.limit.standard.capacity=100
rate.limit.standard.refill-duration=1
rate.limit.strict.capacity=20
rate.limit.strict.refill-duration=1

# OAuth2 Configuration (disabled for tests)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
