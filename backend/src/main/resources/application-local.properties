# ============================================================
# Local Development Profile (spring.profiles.active=local)
# Uses H2 in-memory database, no Redis required
# ============================================================

# ---- H2 In-Memory Database (no PostgreSQL needed) ----
spring.datasource.url=jdbc:h2:mem:travel_planner_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ---- Disable Redis (use simple in-memory cache instead) ----
spring.cache.type=none

# ---- Debug Logging for Local Dev ----
logging.level.com.travelplanner=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ---- Disable Email ----
spring.mail.enabled=false

# ---- File Upload Directory ----
app.photo.upload.dir=./uploads/photos

# ---- JWT - shorter expiry for testing ----
travel.app.jwtExpirationMs=3600000
travel.app.jwtRefreshExpirationMs=86400000

# ---- API Keys (dummy defaults for local dev - override with real values in env) ----
gemini.api.key=${GEMINI_API_KEY:test-gemini-key}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-client-secret}

# ---- JWT Secret (hardcoded default for local dev only) ----
travel.app.jwtSecret=localDevSecretKeyThatIsLongEnoughForHS256Algorithm1234567890

# ---- Server ----
server.port=${PORT:8080}
