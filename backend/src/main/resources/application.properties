# ============================================================
# Default Application Configuration (used when no profile is active)
# ============================================================

# ---- Server ----
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# ---- PostgreSQL Database (default) ----
# Note: On Render, DATABASE_URL is parsed by DatabaseConfig.java (@Profile("production"))
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/travel_planner_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# Hibernate 6+ auto-detects dialect; no need to specify explicitly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.auto-commit=false
spring.jpa.properties.hibernate.connection.autocommit=false

# ---- Logging ----
logging.level.com.travelplanner=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlationId}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlationId}] - %msg%n
logging.file.name=logs/travel-planner.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ---- JWT Authentication ----
travel.app.jwtSecret=${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast256BitsLongForHS256}
travel.app.jwtExpirationMs=900000
travel.app.jwtRefreshExpirationMs=604800000

# ---- Security ----
app.security.email-verification-required=false

# ---- Rate Limiting ----
rate.limit.standard.capacity=100
rate.limit.standard.refill-duration=1
rate.limit.strict.capacity=20
rate.limit.strict.refill-duration=1

# ---- Email (disabled by default) ----
spring.mail.enabled=false
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ---- Frontend URLs ----
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ---- Email Verification ----
app.verification.email-expiration-hours=24
app.verification.password-expiration-hours=1

# ---- Google OAuth 2.0 ----
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ---- Google Gemini AI ----
gemini.api.key=${GEMINI_API_KEY:}

# ---- File Upload ----
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true
app.photo.upload.dir=${PHOTO_UPLOAD_DIR:./uploads/photos}

# ---- Redis Cache ----
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms
# On Render (production profile), RedisConfig.java enables Redis caching
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=travel-planner::
spring.cache.redis.use-key-prefix=true

# ---- Monitoring & Actuator ----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=travel-planner
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s
management.metrics.web.server.request.autotime.enabled=true
spring.boot.admin.client.enabled=false

# ---- App Info ----
info.app.name=WanderGen Backend
info.app.version=1.0.0
info.app.description=AI-Powered Travel Planning Application
info.app.java-version=17
info.app.spring-boot-version=3.1.5
